{% load static  %}
<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Gestion de Stock</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'style.css' %}"/>
</head>
<body>

  <!-- ── Toolbar (lang + theme) ── -->
  <div class="toolbar">
    <div class="lang-pill">
      <button class="lang-btn active" id="btnFR" onclick="setLang('fr')">FR</button>
      <div class="lang-sep"></div>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">
      <!-- Moon — visible in dark mode -->
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <!-- Sun — visible in light mode -->
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <!-- ── Animated background ── -->
  <div class="bg"></div>
  <div class="grid-lines"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ── Login card ── -->
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img class="logo-img" src="{% static 'logo.png' %}" alt="Logo"/>
      <div class="app-name" data-i18n="sectionLabel">Connexion</div>
    </div>

    <!-- Error banner -->
    {% if messages  %}
      {% for message in messages %}
        <div class="error-msg" id="errorMsg">
        <!--<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8"  x2="12"    y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText" data-i18n="errorText">Identifiants incorrects. Veuillez réessayer.</span> -->
          {{ message }}
          
        </div>
      {% endfor %}
    {% endif %}

    <form id="loginForm"  method="post">
      {% csrf_token %}

      <!-- Username -->
      <div class="field">
        <label data-i18n="labelUser">Identifiant</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="username"
                 data-i18n-ph="userPh"
                 name="username"
                 placeholder="Votre identifiant"
                 autocomplete="username" required/>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label data-i18n="labelPw">Mot de passe</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="password"
                 placeholder="••••••••"
                 name="password"
                 autocomplete="current-password" required/>
          <button type="button" class="toggle-pw" id="togglePwBtn"
                  onclick="togglePw()" title="Afficher / Masquer">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember me + forgot password -->
      <div class="row-extras">
        <label class="remember">
          <input type="checkbox" id="remember"/>
          <span data-i18n="rememberMe">Se souvenir de moi</span>
        </label>
        <a href="#" class="forgot" data-i18n="forgotPw">Mot de passe oublié ?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-login" id="btnLogin">
        <span class="btn-text" data-i18n="btnLogin">Se connecter</span>
        <div class="spinner"></div>
      </button>

    </form>

    <!-- Divider 
    <div class="divider">
      <span data-i18n="divider">Sécurisé par VPN</span>
    </div>-->

    <!-- Footer -->
    <div class="card-footer">
      <span data-i18n="footer1">Plateforme réservée aux</span><span class="highlight" data-i18n="footer2"> utilisateurs autorisés</span><br/>
      <span data-i18n="footer3">Toute tentative non autorisée sera enregistrée</span>
    </div>

  </div><!-- /.card -->

  <script src="{% static 'app.js' %}"></script>
</body>
</html>
